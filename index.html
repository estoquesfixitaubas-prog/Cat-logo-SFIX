<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S-Fix Distribuindo Soluções | Catálogo Makita</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f5c8c">
<style>
  :root{
    --azul: #0f5c8c;
    --azul-escuro: #0a4468;
    --vermelho: #c81e2c;
    --teal: #00857c;
    --bg: #eceef0;
    --card: #ffffff;
    --texto: #1c1c1c;
    --cinza: #6b7280;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background-color: var(--bg);
    background-image: url("assets/watermark-tile.png");
    background-repeat: repeat;
    color: var(--texto);
  }

  header {
    background: var(--azul);
    padding: 18px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:nowrap;
  }
  header img { height:56px; object-fit:contain; max-width:42%; }
  header img.makita { height:56px; }

  .tabs {
    display:flex;
    gap:10px;
    max-width:1100px;
    margin:0 auto;
    padding:16px 16px 0;
    flex-wrap:wrap;
  }
  .tab-btn {
    flex:1;
    min-width:160px;
    background:#fff;
    color: var(--azul-escuro);
    border:2px solid var(--azul-escuro);
    border-radius:10px;
    padding:12px 18px;
    font-weight:800;
    font-size:15px;
    letter-spacing:.4px;
    cursor:pointer;
    transition: background .2s ease, color .2s ease, transform .15s ease, box-shadow .2s ease;
    text-align:center;
  }
  .tab-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,.15);
  }
  .tab-btn.ativo {
    background: var(--azul-escuro);
    color:#fff;
  }

  .painel { display:none; }
  .painel.ativo { display:block; }
  #painel-dewalt {
    min-height: 65vh;
  }

  @media (max-width: 480px) {
    .tab-btn { font-size:13px; padding:10px 12px; min-width:0; }
  }

  .aviso {
    background: var(--vermelho);
    color:#fff;
    text-align:center;
    font-weight:700;
    padding:8px;
    font-size:14px;
    letter-spacing:.3px;
  }

  #statusBar {
    background: var(--azul-escuro);
    color:#cbd5e1;
    font-size:12px;
    text-align:center;
    padding:5px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  #dot { width:7px; height:7px; border-radius:50%; background:#4ade80; }
  #dot.offline { background:#f59e0b; }

  .intro-wrap {
    max-width: 1300px;
    margin: 20px auto 0;
    padding: 0 16px;
  }
  .intro-cover {
    display:block;
    width:100%;
    border-radius:12px;
    box-shadow: 0 4px 14px rgba(0,0,0,.2);
    overflow:hidden;
    cursor:pointer;
    border:none;
    padding:0;
    will-change: opacity, transform;
  }
  .intro-cover img {
    width:100%;
    display:block;
    object-fit:cover;
  }

  .search-wrap {
    max-width: 1100px;
    margin: 16px auto 0;
    padding: 0 16px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .search-box {
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border-radius:10px;
    padding:10px 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
    flex:1 1 260px;
  }
  .search-box svg { flex-shrink:0; color: var(--cinza); }
  .search-box input {
    border:none;
    outline:none;
    font-size:15px;
    flex:1;
    color: var(--texto);
    background:transparent;
  }
  .search-box input::placeholder { color:#9ca3af; }
  #clearSearch, #clearSearchDewalt {
    border:none;
    background:#e5e7eb;
    color:#4b5563;
    width:22px;
    height:22px;
    border-radius:50%;
    cursor:pointer;
    font-size:13px;
    display:none;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .sort-box {
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border-radius:10px;
    padding:10px 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
    flex:0 0 auto;
  }
  .sort-box label {
    font-size:13px;
    color: var(--cinza);
    white-space:nowrap;
  }
  .sort-box select {
    border:none;
    outline:none;
    font-size:14px;
    color: var(--texto);
    background:transparent;
    cursor:pointer;
  }
  @media (max-width: 480px) {
    .search-wrap { flex-direction:column; }
    .search-box { flex: none; }
    .sort-box { justify-content:space-between; }
  }
  #noResults, .sem-resultados {
    display:none;
    text-align:center;
    color: var(--cinza);
    padding:40px 16px;
    font-size:15px;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap:18px;
  }
  .card {
    background: var(--card);
    border-radius:10px;
    overflow:hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.12);
    display:flex;
    flex-direction:column;
    cursor:pointer;
    transition: transform .15s ease, box-shadow .15s ease, opacity .6s ease, transform .6s ease;
    opacity: 0;
    transform: translateY(28px);
  }
  .card.visivel {
    opacity: 1;
    transform: translateY(0);
  }
  .card:hover, .card:focus-visible {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,.18);
  }
  .card img {
    width:100%;
    aspect-ratio: 1 / 1;
    object-fit: contain;
    background:#f4f4f4;
    padding:10px;
  }
  .card .info {
    padding:12px 14px 14px;
    border-top: 3px solid var(--teal);
  }
  .card h3 {
    font-size:14.5px;
    line-height:1.3;
    color: var(--azul-escuro);
    margin-bottom:8px;
    min-height:38px;
  }
  .codigos { display:flex; flex-direction:column; gap:7px; }
  .codigo-linha {
    display:flex;
    align-items:stretch;
    font-size:13px;
    font-weight: bold !important;
    border-radius:6px;
    overflow:hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,.15);
  }
  .voltagem {
    background: var(--teal);
    color:#fff;
    font-family:"Futura-BoldCondensed", "Futura Bold Condensed", "Arial Narrow", sans-serif;
    font: weight 700px;
    padding:6px 10px;
    font-size:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    letter-spacing:.3px;
  }
  .codigo {
    background: var(--azul-escuro);
    color:#fff;
    font-family:"Futura-BoldCondensed", "Futura Bold Condensed", "Arial Narrow", sans-serif;
    letter-spacing:1px;
    padding:6px 10px;
    flex:1;
    text-align:center;
  }
  .codigo-linha:not(:has(.voltagem)) .codigo {
    border-radius:6px;
  }

  footer {
    background: var(--vermelho);
    color:#fff;
    text-align:center;
    padding:14px;
    font-weight:700;
    letter-spacing:.5px;
    font-size:15px;
  }

  .lightbox {
    position:fixed;
    inset:0;
    background:rgba(10,10,10,.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:20px;
  }
  .lightbox.open { display:flex; }
  #lightboxImg {
    max-width:min(90vw, 600px);
    max-height:75vh;
    object-fit:contain;
    background:#f4f4f4;
    border-radius:8px;
  }
  .lightbox-content {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    max-width: 100%;
  }
  .lightbox-main {
    display:flex;
    align-items:flex-start;
    gap:22px;
    flex-wrap:nowrap;
  }
  .lightbox-info { color:#fff; text-align:center; }
  .lightbox-info h3 { font-size:18px; margin-bottom:8px; }
  .close-btn {
    position:absolute;
    top:16px;
    left:16px;
    width:52px;
    height:52px;
    border:none;
    border-radius:50%;
    background:#fff;
    padding:6px;
    cursor:pointer;
    box-shadow: 0 2px 10px rgba(0,0,0,.5);
    transition: transform .15s ease;
    z-index:10;
  }
  .close-btn:hover { transform: scale(1.08); }
  .close-btn img { width:100%; height:100%; display:block; }

  .zoom-pane {
    display:none;
    width:380px;
    height:380px;
    flex-shrink:0;
    border-radius:10px;
    border:3px solid #fff;
    background-color:#f4f4f4;
    background-repeat:no-repeat;
    background-size:200%;
  }
  .img-wrap {
    position:relative;
    cursor: crosshair;
  }
  @media (max-width: 900px) {
    .lightbox-main {
      flex-direction: column;
      align-items: center;
    }
    .zoom-pane {
      width: min(85vw, 340px);
      height: min(85vw, 340px);
      margin-top: 2px;
    }
  }

  @media (max-width: 480px) {
    header { padding: 12px 12px; gap:8px; }
    header img { height:34px; }
    .tabs { padding:12px 10px 0; gap:8px; }
    .intro-wrap { padding: 0 6px; margin-top:14px; }
    .grid { grid-template-columns: 1fr 1fr; gap:12px; }
    .card h3 { font-size:13px; min-height:34px; }
  }
</style>

</div>

<div id="painel-makita" class="painel ativo">

    </button>
  </div>

  <div class="search-wrap">

      <input type="text" id="searchInput" placeholder="Buscar por nome, código ou voltagem (ex: GA9020, 220v)">

    <div class="sort-box">

  </div>

  <main>
    <div class="grid" id="grid"></div>
    <div id="noResults">Nenhum produto encontrado para essa busca.</div>
  </main>

  <footer>TELEVENDAS 66 3515-0909</footer>

</div>

<div id="painel-dewalt" class="painel">
  <div class="intro-wrap">
    <button class="intro-cover" id="introDewalt" aria-label="Ampliar página de introdução Dewalt e Stanley">

    </button>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInputDewalt" placeholder="Buscar por nome, código ou voltagem">
      <button id="clearSearchDewalt" aria-label="Limpar busca">✕</button>
    </div>
    <div class="sort-box">
      <label for="sortSelectDewalt">Ordenar:</label>
      <select id="sortSelectDewalt">
        <option value="">Padrão</option>
        <option value="nome">Nome (A-Z)</option>
        <option value="codigo">Código</option>
        <option value="voltagem">Voltagem</option>
      </select>
    </div>
  </div>

  <main>
    <div class="grid" id="gridDewalt"></div>
    <div id="noResultsDewalt" class="sem-resultados">Nenhum produto encontrado para essa busca.</div>
  </main>

  <footer>TELEVENDAS 66 3515-0909</footer>
</div>

<div class="lightbox" id="lightbox">
  <button class="close-btn" id="closeBtn"><img src="assets/seta-voltar.png" alt="Voltar"></button>
  <div class="lightbox-content">
    <div class="lightbox-main">
      <div class="img-wrap">
        <img id="lightboxImg" src="" alt="">
      </div>
      <div class="zoom-pane" id="zoomPane"></div>
    </div>
    <div class="lightbox-info">
      <h3 id="lightboxTitle"></h3>
    </div>
  </div>
</div>

      document.querySelectorAll('.painel').forEach(p => p.classList.remove('ativo'));

      btn.classList.add('ativo');
      document.getElementById(btn.dataset.painel).classList.add('ativo');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  const grid = document.getElementById('grid');
  const noResults = document.getElementById('noResults');
  const gridDewalt = document.getElementById('gridDewalt');
  const noResultsDewalt = document.getElementById('noResultsDewalt');

  function normalizar(s) {
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  const observerCards = new IntersectionObserver((entradas) => {
    entradas.forEach(entrada => {
      if (entrada.isIntersecting) {
        entrada.target.classList.add('visivel');
        observerCards.unobserve(entrada.target);
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

  // ==========================================================
  // Monta os cards de uma lista de produtos dentro de um grid
  // (função genérica — usada para Makita e Dewalt & Stanley)
  // ==========================================================
  function montarGrid(lista, gridEl) {
    lista.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.tabIndex = 0;

      const textoBusca = normalizar(
        p.nome + ' ' + p.codigos.map(c => c.codigo + ' ' + c.voltagem).join(' ')
      );
      card.dataset.search = textoBusca;
      card.dataset.nome = normalizar(p.nome || '');
      card.dataset.codigo = normalizar((p.codigos[0] && p.codigos[0].codigo) || '');
      card.dataset.voltagem = normalizar((p.codigos[0] && p.codigos[0].voltagem) || '');

      const codigosHtml = p.codigos.map(c => `
        <div class="codigo-linha">
          ${c.voltagem ? `<span class="voltagem">${c.voltagem}</span>` : ''}
          <span class="codigo">${c.codigo}</span>
        </div>
      `).join('');

      card.innerHTML = `
        <img src="${p.imagem}" alt="${p.nome}" loading="lazy">
        <div class="info">
          <h3>${p.nome}</h3>
          <div class="codigos">${codigosHtml}</div>
        </div>
      `;

      card.style.transitionDelay = `${(i % 4) * 0.08}s`;

      card.addEventListener('click', () => openLightboxProduto(lista, i));
      card.addEventListener('keydown', e => { if (e.key === 'Enter') openLightboxProduto(lista, i); });

      gridEl.appendChild(card);
      observerCards.observe(card);
    });
  }

  montarGrid(produtos, grid);
  montarGrid(produtosDewalt, gridDewalt);

  // ==========================================================
  // Página de introdução Makita: some suavemente (fade + leve
  // encolhimento) conforme o usuário rola a página para baixo
  // ==========================================================
  const introCoverEl = document.getElementById('introCover');

  function aplicarFadeIntro() {
    const rect = introCoverEl.getBoundingClientRect();
    const altura = rect.height || 1;
    // progresso de 0 (totalmente visível) a 1 (já saiu de cena)
    const progresso = Math.min(Math.max(-rect.top / altura, 0), 1);
    introCoverEl.style.opacity = String(1 - progresso);
    introCoverEl.style.transform = `translateY(${progresso * -30}px) scale(${1 - progresso * 0.06})`;
  }

  window.addEventListener('scroll', aplicarFadeIntro, { passive: true });
  window.addEventListener('resize', aplicarFadeIntro);
  aplicarFadeIntro();

  // ==========================================================
  // Busca por nome, código ou voltagem — funciona 100% offline,
  // pois compara apenas os dados já carregados na página
  // (função genérica — usada para Makita e Dewalt & Stanley)
  // ==========================================================
  function configurarBusca(inputEl, clearBtnEl, gridEl, noResultsEl) {
    function aplicarBusca() {
      const termo = normalizar(inputEl.value.trim());
      let visiveis = 0;
      gridEl.querySelectorAll('.card').forEach(card => {
        const bate = !termo || card.dataset.search.includes(termo);
        card.style.display = bate ? '' : 'none';
        if (bate) visiveis++;
      });
      noResultsEl.style.display = visiveis === 0 ? 'block' : 'none';
      clearBtnEl.style.display = inputEl.value ? 'flex' : 'none';
    }
    inputEl.addEventListener('input', aplicarBusca);
    clearBtnEl.addEventListener('click', () => {
      inputEl.value = '';
      aplicarBusca();
      inputEl.focus();
    });
  }

  configurarBusca(
    document.getElementById('searchInput'),
    document.getElementById('clearSearch'),
    grid,
    noResults
  );
  configurarBusca(
    document.getElementById('searchInputDewalt'),
    document.getElementById('clearSearchDewalt'),
    gridDewalt,
    noResultsDewalt
  );

  // ==========================================================
  // Ordenação dos cards por Nome, Código ou Voltagem
  // (função genérica — usada para Makita e Dewalt & Stanley)
  // ==========================================================
  function configurarOrdenacao(selectEl, gridEl) {
    if (!selectEl) return;
    const ordemOriginal = Array.from(gridEl.querySelectorAll('.card'));

    selectEl.addEventListener('change', () => {
      const chave = selectEl.value;
      let cardsOrdenados;

      if (!chave) {
        cardsOrdenados = ordemOriginal;
      } else {
        cardsOrdenados = Array.from(gridEl.querySelectorAll('.card')).sort((a, b) => {
          const va = a.dataset[chave] || '';
          const vb = b.dataset[chave] || '';
          return va.localeCompare(vb, 'pt-BR', { numeric: true, sensitivity: 'base' });
        });
      }

      cardsOrdenados.forEach(card => gridEl.appendChild(card));
    });
  }

  configurarOrdenacao(document.getElementById('sortSelect'), grid);
  configurarOrdenacao(document.getElementById('sortSelectDewalt'), gridDewalt);

  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxTitle = document.getElementById('lightboxTitle');
  const zoomPane = document.getElementById('zoomPane');

  function openLightboxProduto(lista, i) {
    const p = lista[i];
    lightboxImg.src = p.imagem;
    lightboxImg.alt = p.nome;
    lightboxTitle.textContent = p.nome;
    zoomPane.style.backgroundImage = `url(${p.imagem})`;
    zoomPane.style.display = 'none';
    lightbox.classList.add('open');
  }
  document.getElementById('introCover').addEventListener('click', () => {
    const src = document.getElementById('introCoverImgMakita').getAttribute('src');
    lightboxImg.src = src;
    lightboxImg.alt = 'Catálogo Makita - página de introdução';
    lightboxTitle.textContent = '';
    zoomPane.style.backgroundImage = `url(${src})`;
    zoomPane.style.display = 'none';
    lightbox.classList.add('open');
  });
  document.getElementById('introDewalt').addEventListener('click', () => {
    const src = document.getElementById('introCoverImgDewalt').getAttribute('src');
    lightboxImg.src = src;
    lightboxImg.alt = 'Catálogo Dewalt e Stanley - página de introdução';
    lightboxTitle.textContent = '';
    zoomPane.style.backgroundImage = `url(${src})`;
    zoomPane.style.display = 'none';
    lightbox.classList.add('open');
  });

  document.getElementById('closeBtn').addEventListener('click', () => {
    lightbox.classList.remove('open');
    zoomPane.style.display = 'none';
  });
  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) {
      lightbox.classList.remove('open');
      zoomPane.style.display = 'none';
    }
  });

  // Lupa lateral (passar o mouse amplia 200% na janela ao lado, como em marketplaces)
  const podeUsarHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

  lightboxImg.addEventListener('mouseenter', () => {
    if (podeUsarHover) zoomPane.style.display = 'block';
  });
  lightboxImg.addEventListener('mouseleave', () => {
    zoomPane.style.display = 'none';
  });
  lightboxImg.addEventListener('mousemove', e => {
    if (!podeUsarHover) return;
    const rect = lightboxImg.getBoundingClientRect();
    const xPct = ((e.clientX - rect.left) / rect.width) * 100;
    const yPct = ((e.clientY - rect.top) / rect.height) * 100;
    zoomPane.style.backgroundPosition = `${xPct}% ${yPct}%`;
  });

  // Lupa por toque (celular/tablet): tocar na foto ampliada mostra a mesma
  // lupa de 200%, só que abaixo da imagem, e some ao soltar o dedo.
  function posicionarZoomPorToque(e) {
    const touch = e.touches[0];
    if (!touch) return;
    const rect = lightboxImg.getBoundingClientRect();
    let xPct = ((touch.clientX - rect.left) / rect.width) * 100;
    let yPct = ((touch.clientY - rect.top) / rect.height) * 100;
    xPct = Math.max(0, Math.min(100, xPct));
    yPct = Math.max(0, Math.min(100, yPct));
    zoomPane.style.backgroundPosition = `${xPct}% ${yPct}%`;
  }
  lightboxImg.addEventListener('touchstart', e => {
    if (podeUsarHover) return;
    zoomPane.style.display = 'block';
    posicionarZoomPorToque(e);
  }, { passive: true });
  lightboxImg.addEventListener('touchmove', e => {
    if (podeUsarHover) return;
    posicionarZoomPorToque(e);
    e.preventDefault();
  }, { passive: false });
  lightboxImg.addEventListener('touchend', () => {
    if (podeUsarHover) return;
    zoomPane.style.display = 'none';
  });

  // ==========================================================
  // Status online/offline
  // ==========================================================
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');

  function updateStatus() {
    if (navigator.onLine) {
      dot.classList.remove('offline');
      statusText.textContent = 'Online — catálogo atualizado';
    } else {
      dot.classList.add('offline');
      statusText.textContent = 'Offline — mostrando última versão salva';
    }
  }
  window.addEventListener('online', updateStatus);
  window.addEventListener('offline', updateStatus);
  updateStatus();

  // Registra o service worker (cache offline + atualização automática)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => reg.update());
  }
</script>

</body>
</html>
